# HTTP → HTTPS redirect + ACME challenge passthrough
server {
    listen 80;
    server_name tourdegjug.example.com;   # replace with your domain

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    server_name tourdegjug.example.com;   # replace with your domain

    ssl_certificate     /etc/letsencrypt/live/tourdegjug.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tourdegjug.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Static assets: long-lived cache (fingerprinted by Spring Boot)
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        proxy_pass http://app:8080;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Application proxy
    location / {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
