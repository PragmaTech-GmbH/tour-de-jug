<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — Tour de JUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');</style>
</head>
<body class="bg-gray-50 font-sans antialiased">

<nav class="bg-white border-b border-gray-200 px-6 h-14 flex items-center">
    <a href="/" class="flex items-center gap-2 text-lg font-bold text-gray-900 tracking-tight">
        <span class="text-2xl">&#9749;</span>
        <span>Tour de JUG</span>
    </a>
</nav>

<div class="max-w-lg mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Edit Profile</h1>
    <form th:action="@{/profiles/{u}/edit(u=${profileUser.username})}" method="post"
          class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Display Name</label>
            <input type="text" name="displayName" th:value="${profileUser.displayName}"
                   class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"/>
        </div>
        <div class="flex items-center gap-3">
            <button type="submit"
                    class="bg-brand-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-brand-700 transition-colors">Save</button>
            <a th:href="@{/profiles/{u}(u=${profileUser.username})}"
               class="text-sm text-gray-400 hover:text-gray-600 transition-colors">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
