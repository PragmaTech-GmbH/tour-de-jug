<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile — Tour de JUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-indigo-700 text-white px-6 py-4">
    <a href="/" class="text-xl font-bold">Tour de JUG ☕</a>
</nav>
<div class="max-w-lg mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">Edit Profile</h1>
    <form th:action="@{/profiles/{u}/edit(u=${profileUser.username})}" method="post" class="bg-white rounded-lg shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
            <input type="text" name="displayName" th:value="${profileUser.displayName}"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Save</button>
            <a th:href="@{/profiles/{u}(u=${profileUser.username})}" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
