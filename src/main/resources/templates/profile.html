<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${profileUser.displayName ?: profileUser.username} + ' — Tour de JUG'">Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<nav class="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between">
    <a href="/" class="text-xl font-bold">Tour de JUG ☕</a>
    <div class="text-sm" sec:authorize="isAuthenticated()">
        Hello, <a th:href="@{/profiles/{u}(u=${#authentication.name})}" class="underline" sec:authentication="name">User</a>
        &nbsp;|&nbsp;<a href="/logout" class="hover:text-indigo-200">Logout</a>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Profile header -->
    <div class="bg-white rounded-lg shadow-sm p-6 mb-6 flex items-center gap-6">
        <img th:if="${profileUser.avatarUrl}" th:src="${profileUser.avatarUrl}" alt="Avatar"
             class="w-24 h-24 rounded-full border-2 border-indigo-200"/>
        <div class="flex-1">
            <h1 class="text-2xl font-bold text-gray-900" th:text="${profileUser.displayName ?: profileUser.username}">Name</h1>
            <p class="text-gray-500 mt-1">
                GitHub: <a th:href="'https://github.com/' + ${profileUser.username}" class="text-indigo-600 hover:underline"
                           th:text="'@' + ${profileUser.username}" target="_blank">@username</a>
            </p>
            <p th:if="${isOwnProfile}" class="mt-2">
                <a th:href="@{/profiles/{u}/edit(u=${profileUser.username})}"
                   class="text-sm bg-indigo-100 text-indigo-700 px-3 py-1 rounded hover:bg-indigo-200">Edit Profile</a>
                <a href="/speaking-events/new"
                   class="text-sm bg-green-100 text-green-700 px-3 py-1 rounded hover:bg-green-200 ml-2">Add Talk</a>
            </p>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow-sm p-4 text-center">
            <div class="text-3xl font-bold text-indigo-600" th:text="${totalTalks}">0</div>
            <div class="text-sm text-gray-500 mt-1">Talks Total</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 text-center">
            <div class="text-3xl font-bold text-indigo-600" th:text="${talksThisYear}">0</div>
            <div class="text-sm text-gray-500 mt-1">This Year</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 text-center">
            <div class="text-3xl font-bold text-indigo-600" th:text="${speakingSince ?: '—'}">—</div>
            <div class="text-sm text-gray-500 mt-1">Speaking Since</div>
        </div>
    </div>

    <!-- Talks list -->
    <div class="bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">Recent &amp; Upcoming Talks</h2>
        <div th:if="${#lists.isEmpty(talks)}" class="text-gray-400 text-sm">No talks yet.</div>
        <div th:each="talk : ${talks}" class="border-b border-gray-100 py-3 last:border-0">
            <div class="flex items-start justify-between gap-4">
                <div class="flex-1">
                    <p class="font-medium text-gray-900" th:text="${talk.talkTitle}">Talk Title</p>
                    <p class="text-sm text-gray-500 mt-1">
                        <span th:text="${#strings.substring(talk.eventTime.toString(), 0, 10)}">Date</span>
                        &nbsp;·&nbsp;
                        <a th:href="@{/jugs/{s}(s=${talk.jug.slug})}" class="text-indigo-600 hover:underline"
                           th:text="${talk.jug.name}">JUG Name</a>
                    </p>
                    <div class="flex gap-2 mt-1">
                        <a th:if="${talk.slidesUrl}" th:href="${talk.slidesUrl}" target="_blank"
                           class="text-xs text-blue-600 hover:underline">Slides</a>
                        <a th:if="${talk.recordingUrl}" th:href="${talk.recordingUrl}" target="_blank"
                           class="text-xs text-blue-600 hover:underline">Recording</a>
                    </div>
                </div>
                <span class="text-xs px-2 py-1 rounded-full font-medium"
                      th:classappend="${talk.status.name() == 'APPROVED'} ? 'bg-green-100 text-green-700' : (${talk.status.name() == 'REJECTED'} ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700')"
                      th:text="${talk.status}">PENDING</span>
            </div>
        </div>
    </div>

    <!-- Achievements placeholder -->
    <div class="bg-white rounded-lg shadow-sm p-6 mt-4">
        <h2 class="text-lg font-semibold text-gray-800 mb-2">Achievements</h2>
        <p class="text-sm text-gray-400 italic">Achievements coming soon...</p>
    </div>
</div>

<footer class="bg-gray-800 text-gray-300 text-sm py-3 text-center mt-8">
    © 2026 PragmaTech | <a href="#" class="hover:text-white">Imprint</a>
</footer>
</body>
</html>
