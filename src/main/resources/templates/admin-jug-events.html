<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Pending Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');</style>
</head>
<body class="bg-gray-50 font-sans antialiased">

<nav class="bg-white border-b border-gray-200 px-6 h-14 flex items-center">
    <a href="/" class="flex items-center gap-2 text-lg font-bold text-gray-900 tracking-tight">
        <span class="text-2xl">&#9749;</span>
        <span>Tour de JUG</span>
    </a>
</nav>

<div class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">Pending Events</h1>
    <p class="text-sm text-gray-400 mb-6" th:text="'JUG: ' + ${jug.name}">JUG Name</p>

    <div th:if="${#lists.isEmpty(events)}" class="bg-white rounded-xl border border-gray-200 p-8 text-gray-400 text-sm text-center">
        No pending events.
    </div>

    <div th:each="event : ${events}" class="bg-white rounded-xl border border-gray-200 p-5 mb-3">
        <div class="flex items-center justify-between gap-4">
            <div class="flex-1 min-w-0">
                <p class="font-medium text-gray-900 text-sm" th:text="${event.talkTitle}">Talk Title</p>
                <p class="text-xs text-gray-400 mt-1">
                    <span th:text="${#strings.substring(event.eventTime.toString(), 0, 10)}">Date</span>
                    <span class="mx-1">&middot;</span>
                    <a th:href="@{/profiles/{u}(u=${event.speaker.username})}" class="text-brand-600 hover:text-brand-700"
                       th:text="'@' + ${event.speaker.username}">Speaker</a>
                </p>
                <div class="flex gap-3 mt-1.5">
                    <a th:if="${event.slidesUrl}" th:href="${event.slidesUrl}" target="_blank" class="text-xs text-brand-600 hover:text-brand-700 font-medium">Slides</a>
                    <a th:if="${event.recordingUrl}" th:href="${event.recordingUrl}" target="_blank" class="text-xs text-brand-600 hover:text-brand-700 font-medium">Recording</a>
                </div>
            </div>
            <div class="flex gap-2 shrink-0">
                <form th:action="@{/admin/jugs/{s}/events/{id}/approve(s=${jug.slug},id=${event.id})}" method="post">
                    <button type="submit"
                            class="bg-emerald-600 text-white text-xs px-3.5 py-1.5 rounded-lg hover:bg-emerald-700 font-medium transition-colors">Approve</button>
                </form>
                <form th:action="@{/admin/jugs/{s}/events/{id}/reject(s=${jug.slug},id=${event.id})}" method="post">
                    <button type="submit"
                            class="bg-white text-red-600 border border-red-200 text-xs px-3.5 py-1.5 rounded-lg hover:bg-red-50 font-medium transition-colors">Reject</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
