<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour de JUG — Java User Groups Worldwide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 64px - 48px); }
        .jug-item.active { background-color: #EEF2FF; border-left: 3px solid #4F46E5; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<!-- Navbar -->
<nav class="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between h-16">
    <a href="/" class="text-xl font-bold tracking-tight">Tour de JUG ☕</a>
    <div class="flex items-center gap-4 text-sm">
        <span sec:authorize="isAuthenticated()">
            Hello, <a th:href="@{/profiles/{u}(u=${#authentication.name})}" class="underline" sec:authentication="name">User</a>
            &nbsp;|&nbsp;
            <a href="/logout" class="hover:text-indigo-200">Logout</a>
        </span>
        <span sec:authorize="!isAuthenticated()">
            <a href="/oauth2/authorization/github" class="bg-white text-indigo-700 px-3 py-1 rounded font-semibold hover:bg-indigo-50">Login with GitHub</a>
        </span>
    </div>
</nav>

<!-- Main layout -->
<div class="flex" style="height: calc(100vh - 64px - 48px);">
    <!-- Sidebar -->
    <div class="w-1/5 bg-white border-r border-gray-200 flex flex-col overflow-hidden">
        <div class="p-4 border-b border-gray-100">
            <input id="searchInput" type="text" placeholder="Search JUGs..."
                   class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>
        <div id="jugList" class="flex-1 overflow-y-auto">
            <!-- populated by JS -->
        </div>
        <div class="p-4 border-t border-gray-100 text-xs text-gray-500">
            <p>Showing Java User Groups worldwide.</p>
            <p class="mt-1">Want your JUG listed? <a href="https://github.com/rieckpil/tour-de-jug" class="text-indigo-600 underline" target="_blank">Submit a PR</a></p>
        </div>
    </div>

    <!-- Map -->
    <div id="map" class="flex-1"></div>
</div>

<!-- Footer -->
<footer class="bg-gray-800 text-gray-300 text-sm h-12 flex items-center justify-between px-8">
    <span>© 2026 PragmaTech</span>
    <span>
        <a href="/speaking-events/new" sec:authorize="isAuthenticated()" class="hover:text-white mr-4">Submit a Talk</a>
        <a href="#" class="hover:text-white">Imprint</a>
    </span>
</footer>

<script th:inline="javascript">
    const JUGS = /*[[${jugsJson}]]*/ '[]';
    const jugsData = JSON.parse(JUGS);
</script>
<script src="/js/map.js"></script>
</body>
</html>
