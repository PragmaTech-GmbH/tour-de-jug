<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover Java User Groups worldwide. Browse the interactive map, explore JUG details, and track your conference talks.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Tour de JUG — Java User Groups Worldwide">
    <meta property="og:description" content="Discover Java User Groups worldwide. Browse the interactive map, explore JUG details, and track your conference talks.">
    <meta property="og:image" content="/images/og-image.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tour de JUG — Java User Groups Worldwide">
    <meta name="twitter:description" content="Discover Java User Groups worldwide. Browse the interactive map, explore JUG details, and track your conference talks.">
    <meta name="twitter:image" content="/images/og-image.svg">

    <title>Tour de JUG — Java User Groups Worldwide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .main-layout { flex: 1; display: flex; min-height: 0; }
        #map { flex: 1; min-height: 0; }
        .jug-item { transition: all 0.15s ease; border-left: 3px solid transparent; }
        .jug-item:hover { background-color: #fff7ed; border-left-color: #fed7aa; }
        .jug-item.active { background-color: #ffedd5; border-left-color: #ea580c; }
        .sidebar-scrollbar::-webkit-scrollbar { width: 4px; }
        .sidebar-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scrollbar::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 2px; }
        .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .leaflet-popup-content { margin: 12px 16px; line-height: 1.5; }
    </style>
</head>
<body class="font-sans antialiased">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0">
    <a href="/" class="flex items-center gap-2 text-lg font-bold text-gray-900 tracking-tight">
        <span class="text-2xl">&#9749;</span>
        <span>Tour de JUG</span>
    </a>
    <div class="flex items-center gap-4 text-sm">
        <span sec:authorize="isAuthenticated()" class="flex items-center gap-3">
            <a th:href="@{/profiles/{u}(u=${#authentication.name})}"
               class="text-gray-700 hover:text-brand-600 font-medium transition-colors" sec:authentication="name">User</a>
            <a href="/logout" class="text-gray-400 hover:text-gray-600 transition-colors">Logout</a>
        </span>
        <span sec:authorize="!isAuthenticated()">
            <a href="/oauth2/authorization/github"
               class="inline-flex items-center gap-2 bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                Sign in
            </a>
        </span>
    </div>
</nav>

<!-- Main layout -->
<div class="main-layout flex">
    <!-- Sidebar -->
    <div class="w-80 bg-white border-r border-gray-200 flex flex-col overflow-hidden shrink-0">
        <!-- Top half: JUG list -->
        <div class="flex flex-col" style="height:50%;">
            <div class="p-4 shrink-0">
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input id="searchInput" type="text" placeholder="Search JUGs..."
                           class="w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"/>
                </div>
            </div>
            <div id="jugList" class="flex-1 overflow-y-auto sidebar-scrollbar">
                <!-- populated by JS -->
            </div>
        </div>

        <!-- Bottom half: Top speakers -->
        <div class="flex flex-col border-t border-gray-200" style="height:50%;">
            <div class="px-4 pt-4 pb-2 shrink-0">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Top Speakers</h2>
            </div>
            <div class="flex-1 overflow-y-auto sidebar-scrollbar px-4 space-y-1">
                <div th:each="speaker, iter : ${topSpeakers}">
                    <a th:href="@{/profiles/{u}(u=${speaker.username})}"
                       class="flex items-center gap-3 py-2.5 px-2 rounded-lg hover:bg-gray-50 transition-colors group">
                        <div class="relative shrink-0">
                            <img th:if="${speaker.avatarUrl != ''}" th:src="${speaker.avatarUrl}" alt=""
                                 class="w-9 h-9 rounded-full"/>
                            <div th:if="${speaker.avatarUrl == ''}"
                                 class="w-9 h-9 rounded-full bg-brand-100 flex items-center justify-center text-brand-700 text-sm font-bold"
                                 th:text="${#strings.substring(speaker.displayName, 0, 1)}">?</div>
                            <span class="absolute -top-1 -left-1 w-5 h-5 rounded-full bg-brand-600 text-white text-[10px] font-bold flex items-center justify-center"
                                  th:text="${iter.index + 1}">1</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate group-hover:text-brand-700 transition-colors"
                               th:text="${speaker.displayName}">Name</p>
                            <p class="text-xs text-gray-400">
                                <span th:text="${speaker.talkCount}">0</span> talks
                            </p>
                        </div>
                    </a>
                </div>
                <div th:if="${#lists.isEmpty(topSpeakers)}" class="text-xs text-gray-400 py-4 text-center">
                    No speakers yet.
                </div>
            </div>
            <footer class="p-4 border-t border-gray-100 space-y-1.5 shrink-0">
                <a href="/speaking-events/new" sec:authorize="isAuthenticated()" class="block text-xs text-brand-600 hover:text-brand-700 font-medium">Submit a Talk</a>
                <p class="text-xs text-gray-400 leading-relaxed">
                    Want your JUG listed?
                    <a href="https://github.com/rieckpil/tour-de-jug" class="text-brand-600 hover:text-brand-700 font-medium" target="_blank">Submit a PR</a>
                </p>
                <p class="text-xs text-gray-300">&copy; 2026 PragmaTech &middot; <a href="#" class="hover:text-gray-500">Imprint</a></p>
            </footer>
        </div>
    </div>

    <!-- Map -->
    <div id="map" class="flex-1"></div>
</div>

<script th:inline="javascript">
    const JUGS = /*[[${jugsJson}]]*/ '[]';
    const jugsData = JSON.parse(JUGS);
</script>
<script src="/js/map.js"></script>
</body>
</html>
