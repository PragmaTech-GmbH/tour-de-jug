<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Talk — Tour de JUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');</style>
</head>
<body class="bg-gray-50 font-sans antialiased">

<nav class="bg-white border-b border-gray-200 px-6 h-14 flex items-center">
    <a href="/" class="flex items-center gap-2 text-lg font-bold text-gray-900 tracking-tight">
        <span class="text-2xl">&#9749;</span>
        <span>Tour de JUG</span>
    </a>
</nav>

<div class="max-w-lg mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-6" th:text="${event != null} ? 'Edit Talk' : 'Submit a Talk'">Submit a Talk</h1>

    <form th:action="${event != null} ? @{/speaking-events/{id}(id=${event.id})} : @{/speaking-events}"
          method="post" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">

        <input th:if="${event != null}" type="hidden" name="_method" value="PUT"/>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Talk Title <span class="text-red-400">*</span></label>
            <input type="text" name="talkTitle" required
                   th:value="${event?.talkTitle}"
                   class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Java User Group <span class="text-red-400">*</span></label>
            <div class="relative">
                <input type="text" id="jugSearch" placeholder="Search for a JUG..."
                       class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"/>
                <input type="hidden" name="jugId" id="jugIdInput" th:value="${event?.jug?.id}" required/>
            </div>
            <div id="jugSuggestions" class="border border-gray-200 rounded-lg bg-white hidden mt-1 shadow-lg max-h-48 overflow-y-auto"></div>
            <p th:if="${event?.jug}" class="text-xs text-gray-400 mt-1.5">
                Currently: <span class="text-gray-600" th:text="${event.jug.name}">JUG</span>
            </p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Event Date &amp; Time <span class="text-red-400">*</span></label>
            <input type="datetime-local" name="eventTime" required
                   class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Slides URL <span class="text-gray-400 font-normal">(optional)</span></label>
            <input type="url" name="slidesUrl" th:value="${event?.slidesUrl}"
                   placeholder="https://speakerdeck.com/..."
                   class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Recording URL <span class="text-gray-400 font-normal">(optional)</span></label>
            <input type="url" name="recordingUrl" th:value="${event?.recordingUrl}"
                   placeholder="https://youtube.com/..."
                   class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all"/>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit"
                    class="bg-brand-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-brand-700 transition-colors">
                <span th:text="${event != null} ? 'Update Talk' : 'Submit Talk'">Submit Talk</span>
            </button>
            <a href="javascript:history.back()" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">Cancel</a>

            <form th:if="${event != null}"
                  th:action="@{/speaking-events/{id}(id=${event.id})}" method="post" class="ml-auto">
                <input type="hidden" name="_method" value="DELETE"/>
                <button type="submit" class="text-sm text-red-400 hover:text-red-600 transition-colors"
                        onclick="return confirm('Delete this talk event?')">Delete</button>
            </form>
        </div>
    </form>
</div>

<script>
    var jugSearch = document.getElementById('jugSearch');
    var jugSuggestions = document.getElementById('jugSuggestions');
    var jugIdInput = document.getElementById('jugIdInput');
    var debounceTimer;

    jugSearch.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        var query = this.value.trim();
        if (query.length < 2) {
            jugSuggestions.classList.add('hidden');
            return;
        }
        debounceTimer = setTimeout(function () {
            fetch('/api/jugs/search?q=' + encodeURIComponent(query))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    jugSuggestions.innerHTML = '';
                    if (data.length === 0) {
                        jugSuggestions.classList.add('hidden');
                        return;
                    }
                    data.forEach(function (jug) {
                        var item = document.createElement('div');
                        item.className = 'px-3 py-2.5 cursor-pointer hover:bg-orange-50 text-sm transition-colors';
                        item.textContent = jug.name + ' — ' + jug.city + ', ' + jug.country;
                        item.addEventListener('click', function () {
                            jugSearch.value = jug.name + ' — ' + jug.city + ', ' + jug.country;
                            jugIdInput.value = jug.id;
                            jugSuggestions.classList.add('hidden');
                        });
                        jugSuggestions.appendChild(item);
                    });
                    jugSuggestions.classList.remove('hidden');
                });
        }, 300);
    });

    document.addEventListener('click', function (e) {
        if (!jugSuggestions.contains(e.target) && e.target !== jugSearch) {
            jugSuggestions.classList.add('hidden');
        }
    });
</script>
</body>
</html>
