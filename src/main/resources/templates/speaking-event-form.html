<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Submit a Talk — Tour de JUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-indigo-700 text-white px-6 py-4">
    <a href="/" class="text-xl font-bold">Tour de JUG ☕</a>
</nav>
<div class="max-w-lg mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6" th:text="${event != null} ? 'Edit Talk' : 'Submit a Talk'">Submit a Talk</h1>

    <form th:action="${event != null} ? @{/speaking-events/{id}(id=${event.id})} : @{/speaking-events}"
          method="post" class="bg-white rounded-lg shadow-sm p-6 space-y-4">

        <input th:if="${event != null}" type="hidden" name="_method" value="PUT"/>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Talk Title *</label>
            <input type="text" name="talkTitle" required
                   th:value="${event?.talkTitle}"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Java User Group *</label>
            <input type="text" id="jugSearch" placeholder="Search for a JUG..."
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-1"/>
            <input type="hidden" name="jugId" id="jugIdInput" th:value="${event?.jug?.id}" required/>
            <div id="jugSuggestions" class="border border-gray-200 rounded bg-white hidden shadow-sm max-h-48 overflow-y-auto"></div>
            <p th:if="${event?.jug}" class="text-sm text-gray-500 mt-1">
                Currently: <span th:text="${event.jug.name}">JUG</span>
            </p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Event Date &amp; Time *</label>
            <input type="datetime-local" name="eventTime" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Slides URL (optional)</label>
            <input type="url" name="slidesUrl" th:value="${event?.slidesUrl}"
                   placeholder="https://speakerdeck.com/..."
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Recording URL (optional)</label>
            <input type="url" name="recordingUrl" th:value="${event?.recordingUrl}"
                   placeholder="https://youtube.com/..."
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                <span th:text="${event != null} ? 'Update Talk' : 'Submit Talk'">Submit Talk</span>
            </button>
            <a href="javascript:history.back()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</a>

            <form th:if="${event != null}"
                  th:action="@{/speaking-events/{id}(id=${event.id})}" method="post" class="ml-auto">
                <input type="hidden" name="_method" value="DELETE"/>
                <button type="submit" class="text-red-600 hover:text-red-800 text-sm"
                        onclick="return confirm('Delete this talk event?')">Delete</button>
            </form>
        </div>
    </form>
</div>

<script>
    const jugSearch = document.getElementById('jugSearch');
    const jugSuggestions = document.getElementById('jugSuggestions');
    const jugIdInput = document.getElementById('jugIdInput');
    let debounceTimer;

    jugSearch.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        const query = this.value.trim();
        if (query.length < 2) {
            jugSuggestions.classList.add('hidden');
            return;
        }
        debounceTimer = setTimeout(function () {
            fetch('/api/jugs/search?q=' + encodeURIComponent(query))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    jugSuggestions.innerHTML = '';
                    if (data.length === 0) {
                        jugSuggestions.classList.add('hidden');
                        return;
                    }
                    data.forEach(function (jug) {
                        const item = document.createElement('div');
                        item.className = 'px-3 py-2 cursor-pointer hover:bg-indigo-50 text-sm';
                        item.textContent = jug.name + ' — ' + jug.city + ', ' + jug.country;
                        item.addEventListener('click', function () {
                            jugSearch.value = jug.name + ' — ' + jug.city + ', ' + jug.country;
                            jugIdInput.value = jug.id;
                            jugSuggestions.classList.add('hidden');
                        });
                        jugSuggestions.appendChild(item);
                    });
                    jugSuggestions.classList.remove('hidden');
                });
        }, 300);
    });

    document.addEventListener('click', function (e) {
        if (!jugSuggestions.contains(e.target) && e.target !== jugSearch) {
            jugSuggestions.classList.add('hidden');
        }
    });
</script>
</body>
</html>
