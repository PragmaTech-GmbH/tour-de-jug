# Java User Groups Registry
#
# This file is the source of truth for all JUGs shown on Tour de JUG.
# On application startup, JugImportService syncs this file to the database
# using the "slug" field as stable identifier (not the database UUID).
#
# Contributing via Pull Request:
#   - Add a new JUG:    append an entry with a unique slug (lowercase, hyphens, no special chars)
#   - Update a JUG:     edit fields (name, homepage_url, description, etc.) — keep the slug unchanged
#   - Deactivate a JUG: add "active: false" to the entry
#   - NEVER rename a slug — it would orphan linked talk events in the database
#
# Required fields: slug, name, country
# Optional fields: city, homepage_url, latitude, longitude, established_year, active
#
# Coordinates should point to the city center (used for the map).
# To regenerate this file from public sources, run:
#   RUN_SCRAPER=true ./mvnw test -Dtest=JugDataScraperTest

